# Umbrella compose for the whole LLM platform + console.
#
#   docker compose up --build            # offline, mock models, single origin :8080
#   docker compose --profile full up     # also starts Ollama (real local models)
#
# Assumes the four backend repos are checked out next to this one:
#   ../llm-gateway  ../rag-pgvector  ../mcp-tools-server  ../agent-orchestrator
# Durable state (Postgres, Redis) lives in named volumes and survives `down`.
# The browser only ever talks to Caddy (:8080) — the one origin; the backends
# have no CORS and no browser-safe keys, so Caddy → BFF → backends.

name: llm-platform

x-healthcheck-python: &py-health
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 20s

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      <<: *py-health
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Durable: append-only so usage/cache/limits survive a restart.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *py-health
    restart: unless-stopped

  gateway:
    build: ../llm-gateway
    environment:
      GATEWAY_API_KEYS: ${PLATFORM_KEY:-demo-key}
      # The stack ships Redis: silent per-process degradation would defeat the
      # shared cache/limits/usage/breaker state, so a dead Redis fails startup.
      REDIS_REQUIRED: "true"
      # Without this the console's whole Telemetry section reads "disabled" —
      # in the very stack that ships the Postgres it needs.
      TELEMETRY_DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_RPM: "120"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *py-health
    restart: unless-stopped

  rag:
    build: ../rag-pgvector
    volumes:
      - ./dropbox:/dropbox:ro
    environment:
      RAG_API_KEYS: ${PLATFORM_KEY:-demo-key}
      STORE_BACKEND: pgvector
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-256}
      SEARCH_MODE: hybrid
      # Vectors come through the gateway's /v1/embeddings — one platform
      # entrypoint, one usage ledger. mock-small is the gateway's offline
      # route; its mock embeddings are 256-d, matching EMBEDDING_DIM above.
      EMBEDDINGS_BACKEND: gateway
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mock-small}
      LLM_BACKEND: mock
      LLM_BASE_URL: http://gateway:8080/v1
      LLM_API_KEY: ${PLATFORM_KEY:-demo-key}
      # Folder connector: drop md/txt/pdf/docx into ./dropbox on the host and
      # rag auto-ingests them within ~5 s (content-hash dedup, rescans free).
      INGEST_WATCH_DIR: /dropbox
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8081/healthz')"]
      <<: *py-health
    restart: unless-stopped

  mcp:
    build: ../mcp-tools-server
    environment:
      MCP_API_KEYS: ${PLATFORM_KEY:-demo-key}
    volumes:
      - mcpdata:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket;socket.create_connection(('localhost',8082),3).close()"]
      <<: *py-health
    restart: unless-stopped

  orchestrator:
    build: ../agent-orchestrator
    environment:
      ORCH_API_KEYS: ${PLATFORM_KEY:-demo-key}
      GATEWAY_BASE_URL: http://gateway:8080/v1
      GATEWAY_API_KEY: ${PLATFORM_KEY:-demo-key}
      ORCHESTRATOR_MODEL: mock-small
      RAG_BASE_URL: http://rag:8081/v1
      RAG_API_KEY: ${PLATFORM_KEY:-demo-key}
      MCP_SERVER_URL: http://mcp:8082/mcp
      MCP_API_KEY: ${PLATFORM_KEY:-demo-key}
      # Durable session state in its own schema, isolated from rag's tables.
      ORCH_DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      ORCH_CHECKPOINT_SCHEMA: orchestrator
    depends_on:
      gateway:
        condition: service_healthy
      rag:
        condition: service_healthy
      mcp:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8083/healthz')"]
      <<: *py-health
    restart: unless-stopped

  bff:
    build:
      context: .
      dockerfile: infra/bff.Dockerfile
    environment:
      BFF_PORT: "8787"
      GATEWAY_URL: http://gateway:8080
      GATEWAY_KEY: ${PLATFORM_KEY:-demo-key}
      RAG_URL: http://rag:8081
      RAG_KEY: ${PLATFORM_KEY:-demo-key}
      ORCH_URL: http://orchestrator:8083
      ORCH_KEY: ${PLATFORM_KEY:-demo-key}
    depends_on:
      gateway:
        condition: service_healthy
      rag:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      <<: *py-health
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: infra/web.Dockerfile
    # web.Dockerfile builds the SPA to static assets and bakes them into a Caddy
    # image; Caddy serves them and reverse-proxies /api/* to the BFF.
    ports:
      - "8080:80"
    depends_on:
      bff:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["full"]
    volumes:
      - ollamadata:/root/.ollama
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  mcpdata:
  ollamadata:
