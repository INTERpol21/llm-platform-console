packages:
  - "packages/*"
  - "bff"
  - "web"

# pnpm 11 no longer reads the "pnpm" field from package.json — settings live
# here now. Postinstall scripts do not run unless a package is listed, so these
# are the ones that genuinely need one: biome and esbuild both download a
# platform binary at install time and are broken without it.
onlyBuiltDependencies:
  - "@biomejs/biome"
  - esbuild

# Every package pnpm asks about must get an explicit yes or no, otherwise
# `pnpm install` keeps appending an `allowBuilds:` stub to this file for a human
# to fill in — which then lands in diffs and breaks the install if committed.
# es5-ext's postinstall only prints a funding banner (it is wrapped in
# try/catch and exits 0 either way), so nothing depends on it running.
allowBuilds:
  esbuild: true
  es5-ext: false

# pnpm 11 turns "a dependency's build script did not run" into a hard install
# failure. With allowBuilds above answering the question outright, this only
# still matters for transitive packages that appear later — keeping it means a
# new dependency does not break every build until someone triages it.
strictDepBuilds: false

# Disables pnpm 11's default 24h supply-chain quarantine, which holds back any
# version published within the last day. Deliberate: it blocked builds on
# same-day releases and the delay was not wanted here. See
# docs/adr/0011-no-minimum-release-age.md for the trade-off and what to do
# instead. Set to a value in minutes (e.g. 60) to reinstate a shorter window.
minimumReleaseAge: 0
