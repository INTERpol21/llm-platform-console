packages:
  - "packages/*"
  - "bff"
  - "web"

# pnpm 11 no longer reads the "pnpm" field from package.json — settings live
# here now. Without this, install fails with ERR_PNPM_IGNORED_BUILDS because
# these packages need their build scripts to run.
onlyBuiltDependencies:
  - "@biomejs/biome"
  - esbuild
  - es5-ext

# pnpm 11 turns "a dependency's build script did not run" into a hard install
# failure, including for packages we deliberately do not build. Config rather
# than a per-command flag, so a plain `pnpm install` in CI behaves like the
# image builds do.
strictDepBuilds: false

# Disables pnpm 11's default 24h supply-chain quarantine, which holds back any
# version published within the last day. Deliberate: it blocked builds on
# same-day releases and the delay was not wanted here. See
# docs/adr/0011-no-minimum-release-age.md for the trade-off and what to do
# instead. Set to a value in minutes (e.g. 60) to reinstate a shorter window.
minimumReleaseAge: 0
