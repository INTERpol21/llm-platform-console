name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No `version:` — pnpm/action-setup reads packageManager from package.json,
      # so the pinned version lives in exactly one place.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Generated contracts are committed; fail if they drift from the specs.
      - name: Contracts in sync
        run: |
          pnpm --filter @console/contracts generate
          git diff --exit-code packages/contracts/src

      - name: Lint + format (Biome)
        run: pnpm exec biome check .

      - name: FSD boundaries (Steiger)
        run: pnpm --filter @console/web lint:fsd

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm --filter @console/web build

  # End-to-end against the umbrella stack. Separate job: it needs the four backend
  # repos checked out as siblings and Docker Hub reachable (base images), which the
  # unit job above does not. The unit gate already runs the jsdom axe checks; this
  # adds live-browser Playwright + axe against the running console.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: llm-platform-console
      - name: Check out backend siblings
        run: |
          # No `|| skip`: compose builds these from source, so a missing sibling
          # means the stack is silently incomplete and every later step is
          # meaningless.
          for repo in llm-gateway rag-pgvector mcp-tools-server agent-orchestrator; do
            git clone --depth 1 "https://github.com/INTERpol21/$repo.git" "$repo"
          done
      # Reads packageManager from package.json, so the pinned version lives in
      # exactly one place. This job checks the repo out into a subdirectory (the
      # backends are cloned as siblings), so the action has to be pointed at it.
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: llm-platform-console/package.json
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: llm-platform-console/pnpm-lock.yaml
      # BuildKit layer cache in the GHA cache backend (docker-compose.ci.yml
      # adds cache_from/cache_to). A lockfile-unchanged rebuild skips the
      # pip/pnpm install layers entirely — this took the stack build from ~76s
      # to warm-cache territory. github-runtime exposes the ACTIONS_* env that
      # the `type=gha` cache exporter needs.
      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3
      # Build in the background and install the browser while it runs: the
      # build is network/CPU on Docker's side, the install is network on ours,
      # and nothing below needs the images until the `up` step.
      - name: Build + pull images (background)
        working-directory: llm-platform-console
        run: |
          # Steps run in separate shells, so `wait <pid>` is impossible later —
          # the subshell records its own exit code instead. The base-image pull
          # (postgres/redis, ~25s) runs alongside the build: `up` used to pull
          # them serially after everything else was ready.
          # Explicit bake instead of COMPOSE_BAKE: the compose delegate never
          # engaged on the runner (0 cache imports in the logs), while bake
          # reads the same two files and always goes through buildx.
          (
            set -e
            docker compose pull --quiet postgres redis &
            PULL=$!
            # --allow fs.read=..: the backend build contexts are sibling
            # directories, which bake refuses to read without an entitlement.
            docker buildx bake --allow fs.read=.. -f docker-compose.yml -f docker-compose.ci.yml --load &
            BUILD=$!
            wait "$PULL"
            wait "$BUILD"
            echo 0 > /tmp/stack-build.exit
          ) > /tmp/stack-build.log 2>&1 || echo 1 > /tmp/stack-build.exit &
      - name: Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('llm-platform-console/pnpm-lock.yaml') }}
      - name: Install + Playwright browser
        working-directory: llm-platform-console
        run: |
          pnpm install --frozen-lockfile
          # No --with-deps: ubuntu-latest runners already carry the chromium
          # system libraries, and the apt round-trip cost ~15s per run. With
          # the browser cache hot this is a no-op verify.
          pnpm --filter @console/web exec playwright install chromium
      - name: Bring up the umbrella stack (offline, mock models)
        working-directory: llm-platform-console
        run: |
          while [ ! -f /tmp/stack-build.exit ]; do sleep 2; done
          if [ "$(cat /tmp/stack-build.exit)" != "0" ]; then
            echo "::error::image build failed"; tail -100 /tmp/stack-build.log; exit 1
          fi
          # Cache effectiveness at a glance: CACHED layer count + gha cache I/O.
          grep -cE "CACHED" /tmp/stack-build.log | xargs echo "cached layers:"
          grep -E "importing cache|exporting cache|ERROR" /tmp/stack-build.log | tail -6 || true
          docker compose up -d --wait --no-build
      # Runs before the browser suite: it is the only thing that exercises
      # service-to-service wiring. Every backend's unit suite mocks its
      # neighbours, so a missing /v1 prefix in the orchestrator's RAG client once
      # shipped green through ruff, mypy, pytest and CodeQL — every retrieval
      # 404'd and the agent quietly answered with no evidence at all.
      - name: Cross-service smoke
        working-directory: llm-platform-console
        run: |
          python3 -m pip install --quiet httpx
          python3 scripts/platform_smoke.py
      - name: E2E (Playwright + axe)
        working-directory: llm-platform-console
        env:
          E2E_BASE_URL: http://localhost:8080
        run: pnpm --filter @console/web test:e2e
      # Image CVE gate. Runs here because this is the only job that builds all
      # six images. Policy: fail on CRITICAL with an available fix; unfixable
      # base-image findings (debian's perl et al. carry perpetual HIGHs with no
      # patch) must not hold CI hostage — package-level CVEs are already watched
      # by pip-audit and Dependabot. Partly repays the supply-chain window
      # opened by disabling minimumReleaseAge (ADR-0011).
      # The DB download was ~15 s of every run; roll the cache forward
      # (unique save key, latest restore) because trivy self-updates it.
      - name: Trivy DB cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Image CVE gate (Trivy)
        run: |
          for img in gateway rag mcp orchestrator bff caddy; do
            echo "── llm-platform-${img} ──"
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$HOME/.cache/trivy:/root/.cache/trivy" \
              aquasec/trivy:latest image --scanners vuln --severity CRITICAL \
              --ignore-unfixed --exit-code 1 --quiet "llm-platform-${img}:latest"
          done
      - name: Stack logs on failure
        if: failure()
        working-directory: llm-platform-console
        run: docker compose logs --no-color | tail -200
